<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>계산기</title>
  <style>
    :root {
      --bg-1: #fff4e6;
      --bg-2: #ffd9b8;
      --panel: rgba(255, 255, 255, 0.85);
      --text: #1f1a16;
      --accent: #ff6b35;
      --accent-2: #ff8c42;
      --line: #2f2620;
      --shadow: 0 14px 28px rgba(0, 0, 0, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "IBM Plex Sans", "Noto Sans KR", sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 15% 15%, #ffe9cc 0, transparent 46%),
        radial-gradient(circle at 85% 8%, #ffc99a 0, transparent 52%),
        linear-gradient(145deg, var(--bg-1), var(--bg-2));
      padding: 20px;
    }

    .calculator {
      width: min(360px, 100%);
      border: 2px solid var(--line);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(5px);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .display-wrap {
      border: 2px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
      background: #fff;
      margin-bottom: 14px;
    }

    .history {
      min-height: 20px;
      text-align: right;
      font-size: 13px;
      opacity: 0.65;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .display {
      width: 100%;
      border: 0;
      text-align: right;
      font-size: clamp(30px, 6vw, 38px);
      font-weight: 600;
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      color: var(--text);
      outline: none;
      background: transparent;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }

    button {
      border: 2px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      padding: 14px 0;
      font-size: 19px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover {
      filter: brightness(0.97);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .op {
      background: #fff0e7;
    }

    .equal {
      background: linear-gradient(160deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    .span-2 {
      grid-column: span 2;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.7;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="calculator" aria-label="기본 계산기">
    <div class="display-wrap">
      <div id="history" class="history" aria-live="polite"></div>
      <input id="display" class="display" type="text" value="0" readonly aria-label="계산 결과" />
    </div>

    <div class="keys">
      <button type="button" data-action="clear" class="op">AC</button>
      <button type="button" data-action="delete" class="op">DEL</button>
      <button type="button" data-value="%" class="op">%</button>
      <button type="button" data-value="/" class="op">÷</button>

      <button type="button" data-value="7">7</button>
      <button type="button" data-value="8">8</button>
      <button type="button" data-value="9">9</button>
      <button type="button" data-value="*" class="op">×</button>

      <button type="button" data-value="4">4</button>
      <button type="button" data-value="5">5</button>
      <button type="button" data-value="6">6</button>
      <button type="button" data-value="-" class="op">−</button>

      <button type="button" data-value="1">1</button>
      <button type="button" data-value="2">2</button>
      <button type="button" data-value="3">3</button>
      <button type="button" data-value="+" class="op">+</button>

      <button type="button" data-value="0" class="span-2">0</button>
      <button type="button" data-value=".">.</button>
      <button type="button" data-action="equals" class="equal">=</button>
    </div>

    <p class="hint">키보드 입력 지원: 숫자, 연산자, Enter, Backspace, Esc</p>
  </main>

  <script>
    const display = document.getElementById("display");
    const historyEl = document.getElementById("history");
    const keys = document.querySelector(".keys");

    let current = "0";
    let expression = "";
    let shouldReset = false;

    function updateDisplay() {
      display.value = current;
      historyEl.textContent = expression;
    }

    function isOperator(char) {
      return ["+", "-", "*", "/", "%"].includes(char);
    }

    function appendNumber(num) {
      if (shouldReset) {
        current = "0";
        shouldReset = false;
      }
      current = current === "0" ? num : current + num;
      updateDisplay();
    }

    function appendDot() {
      if (shouldReset) {
        current = "0";
        shouldReset = false;
      }
      if (!current.includes(".")) {
        current += ".";
      }
      updateDisplay();
    }

    function setOperator(op) {
      if (isOperator(expression.slice(-1))) {
        expression = expression.slice(0, -1) + op;
      } else {
        expression += current + op;
      }
      shouldReset = true;
      updateDisplay();
    }

    function clearAll() {
      current = "0";
      expression = "";
      shouldReset = false;
      updateDisplay();
    }

    function deleteOne() {
      if (shouldReset) return;
      current = current.length > 1 ? current.slice(0, -1) : "0";
      updateDisplay();
    }

    function calculate() {
      const fullExpression = expression + current;
      if (!fullExpression || isOperator(fullExpression.slice(-1))) return;

      try {
        const result = Function("return (" + fullExpression + ")")();
        if (!Number.isFinite(result)) {
          throw new Error("Invalid result");
        }

        historyEl.textContent = fullExpression + " =";
        current = String(Number(result.toFixed(12)));
        expression = "";
        shouldReset = true;
        updateDisplay();
      } catch {
        current = "Error";
        expression = "";
        shouldReset = true;
        updateDisplay();
      }
    }

    keys.addEventListener("click", (event) => {
      const btn = event.target.closest("button");
      if (!btn) return;

      const { value, action } = btn.dataset;

      if (action === "clear") return clearAll();
      if (action === "delete") return deleteOne();
      if (action === "equals") return calculate();

      if (!value) return;
      if (/^\d$/.test(value)) return appendNumber(value);
      if (value === ".") return appendDot();
      if (isOperator(value)) return setOperator(value);
    });

    window.addEventListener("keydown", (event) => {
      const { key } = event;

      if (/^\d$/.test(key)) return appendNumber(key);
      if (key === ".") return appendDot();
      if (["+", "-", "*", "/", "%"].includes(key)) return setOperator(key);
      if (key === "Enter" || key === "=") {
        event.preventDefault();
        return calculate();
      }
      if (key === "Backspace") return deleteOne();
      if (key === "Escape") return clearAll();
    });

    updateDisplay();
  </script>
</body>
</html>
