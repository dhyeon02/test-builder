<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>현재 시간</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1ea;
      --ink: #2a1f1a;
      --accent: #b73a2d;
      --card: rgba(255, 255, 255, 0.78);
      --border: #3a2a22;
      --shadow: 0 18px 35px rgba(0,0,0,0.12);
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #131314;
      --ink: #f3ede6;
      --accent: #ff8a6f;
      --card: rgba(25, 25, 28, 0.82);
      --border: #5b4a41;
      --shadow: 0 18px 35px rgba(0,0,0,0.4);
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: "IBM Plex Sans", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(255, 233, 210, 0.9), transparent 55%),
                  radial-gradient(circle at 80% 10%, rgba(247, 199, 163, 0.9), transparent 60%),
                  var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
    }
    :root[data-theme="dark"] body {
      background: radial-gradient(circle at 20% 20%, rgba(72, 52, 48, 0.8), transparent 55%),
                  radial-gradient(circle at 80% 10%, rgba(55, 44, 58, 0.8), transparent 60%),
                  var(--bg);
    }
    .card {
      background: var(--card);
      backdrop-filter: blur(6px);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 32px 36px;
      min-width: 280px;
      box-shadow: var(--shadow);
    }
    h1 {
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 12px 0;
    }
    .time {
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      font-size: 48px;
      font-weight: 600;
      color: var(--accent);
    }
    .toggle-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }
    .theme-toggle {
      border: 1px solid var(--border);
      background: transparent;
      color: inherit;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: 0.04em;
      cursor: pointer;
    }
    .theme-toggle:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .date {
      margin-top: 8px;
      font-size: 16px;
      opacity: 0.85;
    }
    .calendar {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(140px, 1fr));
      gap: 14px;
    }
    .month {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.6);
    }
    :root[data-theme="dark"] .month {
      background: rgba(34, 34, 38, 0.6);
    }
    .month h2 {
      margin: 0 0 8px 0;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #3a2a22;
    }
    .weekday-row,
    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      text-align: center;
      font-size: 11px;
    }
    .weekday-row {
      font-weight: 600;
      opacity: 0.7;
      margin-bottom: 4px;
    }
    .day {
      padding: 2px 0;
      border-radius: 6px;
    }
    .today {
      background: #b73a2d;
      color: white;
    }
    :root[data-theme="dark"] .today {
      background: #ff8a6f;
      color: #1c1b1a;
    }
    .empty {
      opacity: 0;
    }
    @media (max-width: 880px) {
      .calendar {
        grid-template-columns: repeat(2, minmax(140px, 1fr));
      }
    }
    @media (max-width: 600px) {
      .calendar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>현재 시간</h1>
    <div id="time" class="time">--:--:--</div>
    <div id="date" class="date"></div>
    <div id="calendar" class="calendar" aria-label="올해 달력"></div>
  </div>

  <script>
    const timeEl = document.getElementById("time");
    const dateEl = document.getElementById("date");
    const calendarEl = document.getElementById("calendar");

    const monthLabels = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];
    const weekdays = ["일", "월", "화", "수", "목", "금", "토"];

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString("ko-KR", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      const date = now.toLocaleDateString("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
      timeEl.textContent = time;
      dateEl.textContent = date;
    }

    function buildCalendar(year) {
      calendarEl.innerHTML = "";

      for (let month = 0; month < 12; month += 1) {
        const monthBox = document.createElement("div");
        monthBox.className = "month";

        const title = document.createElement("h2");
        title.textContent = `${year} ${monthLabels[month]}`;
        monthBox.appendChild(title);

        const weekdayRow = document.createElement("div");
        weekdayRow.className = "weekday-row";
        weekdays.forEach((label) => {
          const cell = document.createElement("div");
          cell.textContent = label;
          weekdayRow.appendChild(cell);
        });
        monthBox.appendChild(weekdayRow);

        const daysGrid = document.createElement("div");
        daysGrid.className = "days";

        const firstDay = new Date(year, month, 1);
        const startOffset = firstDay.getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < startOffset; i += 1) {
          const empty = document.createElement("div");
          empty.className = "day empty";
          empty.textContent = "0";
          daysGrid.appendChild(empty);
        }

        for (let day = 1; day <= daysInMonth; day += 1) {
          const cell = document.createElement("div");
          cell.className = "day";
          cell.textContent = String(day);

          const now = new Date();
          if (
            now.getFullYear() === year &&
            now.getMonth() === month &&
            now.getDate() === day
          ) {
            cell.classList.add("today");
          }

          daysGrid.appendChild(cell);
        }

        monthBox.appendChild(daysGrid);
        calendarEl.appendChild(monthBox);
      }
    }

    updateClock();
    buildCalendar(new Date().getFullYear());
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
