<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>현재 시간</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1ea;
      --ink: #2a1f1a;
      --accent: #b73a2d;
    }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: "IBM Plex Sans", "Noto Sans KR", sans-serif;
      background: radial-gradient(circle at 20% 20%, #ffe9d2, transparent 55%),
                  radial-gradient(circle at 80% 10%, #f7c7a3, transparent 60%),
                  var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
    }
    .card {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(6px);
      border: 2px solid #3a2a22;
      border-radius: 20px;
      padding: 32px 36px;
      min-width: 280px;
      box-shadow: 0 18px 35px rgba(0,0,0,0.12);
    }
    h1 {
      font-size: 18px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 12px 0;
    }
    .time {
      font-family: "Space Grotesk", "IBM Plex Sans", sans-serif;
      font-size: 48px;
      font-weight: 600;
      color: var(--accent);
    }
    .date {
      margin-top: 8px;
      font-size: 16px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>현재 시간</h1>
    <div id="time" class="time">--:--:--</div>
    <div id="date" class="date"></div>
  </div>

  <script>
    const timeEl = document.getElementById("time");
    const dateEl = document.getElementById("date");

    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString("ko-KR", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
      const date = now.toLocaleDateString("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
      timeEl.textContent = time;
      dateEl.textContent = date;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
